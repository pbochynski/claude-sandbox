name: Build and push images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: pbochynski

jobs:
  build-claude-sandbox:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push claude-sandbox
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-sandbox:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/claude-sandbox:${{ github.sha }}
          cache-from: type=gha,scope=claude-sandbox
          cache-to: type=gha,mode=max,scope=claude-sandbox

  build-tunnel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push tunnel (chisel server)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.tunnel
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/chisel-tunnel:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/chisel-tunnel:${{ github.sha }}
          cache-from: type=gha,scope=chisel-tunnel
          cache-to: type=gha,mode=max,scope=chisel-tunnel
